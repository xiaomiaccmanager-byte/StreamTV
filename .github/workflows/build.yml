name: Build StreamTV APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Find project and build
        run: |
          # Ищем папку где лежит settings.gradle
          PROJECT=$(dirname $(find . -name "settings.gradle" | head -1))
          echo "Found project at: $PROJECT"
          cd $PROJECT
          
          # Скачиваем gradle wrapper
          curl -L https://services.gradle.org/distributions/gradle-8.4-bin.zip -o gradle.zip
          unzip -q gradle.zip
          ./gradle-8.4/bin/gradle wrapper
          chmod +x gradlew
          
          # Собираем APK
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StreamTV-debug
          path: '**/app-debug.apk'
          retention-days: 7
